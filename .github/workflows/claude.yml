name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: uigen/package-lock.json

      - name: Install dependencies
        working-directory: uigen
        run: npm ci

      - name: Setup database
        working-directory: uigen
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Install Playwright browsers
        working-directory: uigen
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        working-directory: uigen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run dev:daemon

      - name: Wait for dev server
        run: |
          echo "Waiting for Next.js dev server..."
          for i in $(seq 1 30); do
            if grep -q "Ready in" uigen/logs.txt 2>/dev/null; then
              echo "Server ready after $((i * 2))s"
              grep "Ready in\|Local:" uigen/logs.txt
              break
            fi
            sleep 2
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Server did not start within 60s. Dumping logs:"
              cat uigen/logs.txt
              exit 1
            fi
          done

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          mcp_config: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": ["@playwright/mcp@latest", "--headless"]
                }
              }
            }
          allowed_tools: |
            Bash
            mcp__playwright__browser_navigate
            mcp__playwright__browser_snapshot
            mcp__playwright__browser_take_screenshot
            mcp__playwright__browser_click
            mcp__playwright__browser_type
            mcp__playwright__browser_fill_form
            mcp__playwright__browser_select_option
            mcp__playwright__browser_press_key
            mcp__playwright__browser_hover
            mcp__playwright__browser_drag
            mcp__playwright__browser_evaluate
            mcp__playwright__browser_run_code
            mcp__playwright__browser_wait_for
            mcp__playwright__browser_navigate_back
            mcp__playwright__browser_tabs
            mcp__playwright__browser_close
            mcp__playwright__browser_resize
            mcp__playwright__browser_network_requests
            mcp__playwright__browser_console_messages
            mcp__playwright__browser_handle_dialog
            mcp__playwright__browser_file_upload
